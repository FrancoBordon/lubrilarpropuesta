<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propuesta Lubrilar SP — FC IA Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#060b18;color:#e2e8f0;line-height:1.6;overflow-x:hidden}
        .serif{font-family:'Playfair Display',Georgia,serif}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0a1128}::-webkit-scrollbar-thumb{background:#FFD600;border-radius:3px}
        .flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-center{justify-content:center}.justify-between{justify-content:space-between}
        .gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.gap-6{gap:24px}.gap-8{gap:32px}
        .text-center{text-align:center}.text-right{text-align:right}.text-left{text-align:left}
        .grid{display:grid}.grid-2{grid-template-columns:1fr}.grid-3{grid-template-columns:1fr}
        @media(min-width:768px){.grid-2{grid-template-columns:1fr 1fr}.grid-3{grid-template-columns:1fr 1fr 1fr}.md-flex{display:flex}.md-show{display:flex!important}.md-hide{display:none!important}}
        .relative{position:relative}.z-10{z-index:10}.overflow-hidden{overflow:hidden}.inline-flex{display:inline-flex}.flex-1{flex:1}.flex-shrink-0{flex-shrink:0}.flex-wrap{flex-wrap:wrap}
        .p-4{padding:16px}.p-5{padding:20px}.p-6{padding:24px}.p-8{padding:32px}.p-10{padding:40px}
        .px-2{padding-left:8px;padding-right:8px}.px-3{padding-left:12px;padding-right:12px}.px-4{padding-left:16px;padding-right:16px}.px-6{padding-left:24px;padding-right:24px}.px-8{padding-left:32px;padding-right:32px}
        .py-1{padding-top:4px;padding-bottom:4px}.py-2{padding-top:8px;padding-bottom:8px}.py-3{padding-top:12px;padding-bottom:12px}.py-4{padding-top:16px;padding-bottom:16px}
        .pt-2{padding-top:8px}
        .mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mt-6{margin-top:24px}.mt-8{margin-top:32px}.mt-10{margin-top:40px}.mt-12{margin-top:48px}.mt-16{margin-top:64px}
        .mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}.mb-8{margin-bottom:32px}.mb-10{margin-bottom:40px}.mb-12{margin-bottom:48px}.mb-16{margin-bottom:64px}
        .ml-2{margin-left:8px}.ml-3{margin-left:12px}
        .rounded{border-radius:8px}.rounded-lg{border-radius:12px}.rounded-xl{border-radius:16px}.rounded-2xl{border-radius:20px}.rounded-full{border-radius:9999px}
        .text-xs{font-size:12px}.text-sm{font-size:14px}.text-base{font-size:16px}.text-lg{font-size:18px}.text-xl{font-size:20px}.text-2xl{font-size:24px}.text-3xl{font-size:30px}.text-4xl{font-size:36px}.text-5xl{font-size:48px}
        @media(min-width:768px){.md-text-5xl{font-size:48px}.md-text-7xl{font-size:72px}}
        .font-light{font-weight:300}.font-normal{font-weight:400}.font-medium{font-weight:500}.font-semibold{font-weight:600}.font-bold{font-weight:700}.font-extrabold{font-weight:800}
        .tracking-tight{letter-spacing:-0.02em}.tracking-wide{letter-spacing:0.05em}.tracking-wider{letter-spacing:0.1em}
        .leading-relaxed{line-height:1.7}.leading-tight{line-height:1.1}
        .text-white{color:#fff}.text-white-70{color:rgba(255,255,255,.7)}.text-white-50{color:rgba(255,255,255,.5)}.text-white-40{color:rgba(255,255,255,.4)}.text-white-30{color:rgba(255,255,255,.3)}.text-white-20{color:rgba(255,255,255,.2)}.text-white-15{color:rgba(255,255,255,.15)}.text-white-25{color:rgba(255,255,255,.25)}
        .text-yellow{color:#FFD600}.text-blue{color:#1565C0}.text-red{color:#D32F2F}.text-cyan{color:#00BFA5}
        .bg-yellow{background:#FFD600}.bg-yellow-10{background:rgba(255,214,0,.1)}.bg-blue-10{background:rgba(21,101,192,.1)}.bg-red-10{background:rgba(211,47,47,.1)}.bg-cyan-10{background:rgba(0,191,165,.1)}
        .bg-white-2{background:rgba(255,255,255,.02)}.bg-white-3{background:rgba(255,255,255,.03)}.bg-white-5{background:rgba(255,255,255,.05)}
        .border{border:1px solid}.border-white-5{border-color:rgba(255,255,255,.05)}.border-white-6{border-color:rgba(255,255,255,.06)}.border-white-10{border-color:rgba(255,255,255,.1)}
        .border-yellow-10{border-color:rgba(255,214,0,.1)}.border-yellow-20{border-color:rgba(255,214,0,.2)}
        .border-bottom{border-bottom:1px solid rgba(255,255,255,.05)}.border-top{border-top:1px solid rgba(255,255,255,.05)}
        .topbar{position:sticky;top:0;z-index:50;background:rgba(10,17,40,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.05);height:56px;display:flex;align-items:center;padding:0 24px}
        .topbar-inner{max-width:1200px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between}
        .hero{min-height:90vh;display:flex;align-items:center;justify-content:center;padding:80px 24px 60px;position:relative;overflow:hidden;background:radial-gradient(ellipse at 30% 50%,rgba(21,101,192,.12) 0%,transparent 60%),radial-gradient(ellipse at 70% 30%,rgba(255,214,0,.06) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(0,191,165,.04) 0%,transparent 50%),#060b18}
        .hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,214,0,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,214,0,.025) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
        .glow-blob{position:absolute;border-radius:50%;filter:blur(120px);pointer-events:none}
        .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,214,0,.25),rgba(21,101,192,.25),transparent)}
        .card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:32px;transition:all .4s cubic-bezier(.4,0,.2,1)}
        .card:hover{transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 40px rgba(255,214,0,.06)}
        .card-sm{padding:24px;border-radius:16px}
        .badge{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:9999px;font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase}
        .badge-yellow{background:rgba(255,214,0,.1);border:1px solid rgba(255,214,0,.2);color:#FFD600}
        .badge-blue{background:rgba(21,101,192,.1);border:1px solid rgba(21,101,192,.2);color:#1565C0}
        .badge-cyan{background:rgba(0,191,165,.1);border:1px solid rgba(0,191,165,.2);color:#00BFA5}
        .badge-white{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4)}
        .icon-box{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .section-label{display:flex;align-items:center;gap:12px;margin-bottom:16px}
        .section-label-line{width:32px;height:2px;background:#FFD600}
        .section-label-text{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase}
        .benefit-card{border-radius:20px;padding:32px;transition:all .4s ease}
        .benefit-card:hover{transform:translateY(-4px)}
        .price-row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:16px;align-items:center;padding:24px 32px;border-bottom:1px solid rgba(255,255,255,.05);transition:background .3s ease}
        .price-row:hover{background:rgba(255,214,0,.02)}
        @media(max-width:767px){.price-row{display:flex!important;flex-direction:column;gap:4px}.price-row>div:last-child{text-align:left!important}.price-row>div:nth-child(2){align-self:flex-start}}
        .timeline-item{display:flex;gap:32px;margin-bottom:48px;position:relative}
        .timeline-dot{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:2;font-size:12px;font-weight:700}
